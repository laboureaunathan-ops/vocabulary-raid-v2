function isSolidGrid(wx, wy) {
  const col = Math.floor(wx / 16);
  const row = Math.floor(wy / 16);
  if (row < 0 || row >= 40 || col < 0 || col >= 40) return true;
  return COLLISION_GRID[row][col] === 1;
}

// ── WORLDMAP ──
class WorldMapScene extends Phaser.Scene {
  constructor() { super('WorldMap'); }

  create() {
    const ZOOM = 2;
    const map = this.make.tilemap({ key: 'map' });
    this._map = map;

    // Tilesets
    const tsDefs = [
      'Atlas_Buildings','Atlas_Props','Atlas_Rocks','Atlas_Trees_Bushes',
      'Tileset_Ground','Tileset_RockSlope','Tileset_RockSlope_Simple',
      'Tileset_Water','Road','Tileset_Shadow',
      'Animation_Flowers_Red','Animation_Flowers_White','Campfire',
    ];
    const tilesets = [];
    for (const key of tsDefs) {
      try {
        const ts = map.addTilesetImage(key, key, 16, 16, 0, 0);
        if (ts) tilesets.push(ts);
      } catch(e) { console.warn('tileset skip:', key); }
    }
    console.log('Tilesets:', tilesets.length);

    // Calques — RockSlopes_Auto exclu car quadrillage vide
    const layerOrder = ['Ground','Flowers','Road','RockSlopes_Auto','Water','Shadows/Shadows'];
    const layers = [];
    for (let i = 0; i < layerOrder.length; i++) {
      try {
        const l = map.createLayer(layerOrder[i], tilesets, 0, 0);
        if (l) { l.setDepth(i); layers.push(l); }
      } catch(e) {}
    }
    console.log('Layers:', layers.map(l=>l.layer.name));

    // Objets individuels
    for (const obj of OBJECTS) {
      const key = obj.img.replace('.png','');
      if (!this.textures.exists(key)) continue;
      this.add.image(obj.x, obj.y, key)
        .setOrigin(0, 1)
        .setDisplaySize(obj.w, obj.h)
        .setDepth(obj.y);
    }

    // ── Animations joueur ──
    // Idle: 4 cols x 4 lignes — ordre réel : up=0, right=1, down=2, left=3
    const DIRS = ['up','down','left','right'];
    DIRS.forEach((dir, row) => {
      this.anims.create({ key: 'idle_' + dir, frames: this.anims.generateFrameNumbers('char_idle',  { start: row*4, end: row*4+3 }), frameRate: 4,  repeat: -1 });
      this.anims.create({ key: 'walk_' + dir, frames: this.anims.generateFrameNumbers('char_walk',  { start: row*4, end: row*4+3 }), frameRate: 8,  repeat: -1 });
      this.anims.create({ key: 'slash_'+ dir, frames: this.anims.generateFrameNumbers('char_slash', { start: row*6, end: row*6+5 }), frameRate: 12, repeat: 0 });
    });

    // Spawn joueur
    this._px = 5 * 16 + 8;
    this._py = 10 * 16 + 8;
    this._facing = 'down';
    this._moving = false;
    this._shadow = this.add.graphics().setDepth(500);

    this._sprite = this.add.sprite(this._px, this._py, 'char_idle')
      .setDepth(501)
      .setScale(0.72)
      .play('idle_down');

    // Caméra
    this.cameras.main.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
    this.cameras.main.setZoom(ZOOM);
    this.cameras.main.centerOn(this._px, this._py);

    // Input
    this._cursors = this.input.keyboard.createCursorKeys();
    this._keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this._keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);
    this._keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this._keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this._keyZ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z);
    this._keyQ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Q);


    // ── D-pad tactile (mobile) ──
    const dpad = { up: false, down: false, left: false, right: false };
    this._dpad = dpad;

    const btnSize = 60;
    const margin  = 24;
    const cx = margin + btnSize;
    const cy = this.scale.height - margin - btnSize;

    const makeBtn = (x, y, dir) => {
      const arrows = { up:'▲', down:'▼', left:'◄', right:'►' };
      // Fond semi-transparent
      const bg = this.add.circle(x, y, btnSize/2, 0x000000, 0.35)
        .setScrollFactor(0).setDepth(2000);
      // Zone interactive invisible plus grande pour faciliter le touch
      const hit = this.add.circle(x, y, btnSize/2 + 4, 0xffffff, 0)
        .setScrollFactor(0).setDepth(2001)
        .setInteractive({ useHandCursor: false });
      // Flèche
      this.add.text(x, y, arrows[dir], {
        font: '22px monospace', fill: '#f0e0a0'
      }).setOrigin(0.5).setScrollFactor(0).setDepth(2002);

      hit.on('pointerdown',   () => { dpad[dir] = true;  bg.setFillStyle(0xffffff, 0.25); });
      hit.on('pointerup',     () => { dpad[dir] = false; bg.setFillStyle(0x000000, 0.35); });
      hit.on('pointerout',    () => { dpad[dir] = false; bg.setFillStyle(0x000000, 0.35); });
      hit.on('pointercancel', () => { dpad[dir] = false; bg.setFillStyle(0x000000, 0.35); });
    };

    makeBtn(cx,           cy - btnSize, 'up');
    makeBtn(cx,           cy + btnSize, 'down');
    makeBtn(cx - btnSize, cy,           'left');
    makeBtn(cx + btnSize, cy,           'right');

    // Bouton action (ESPACE) en bas à droite
    const abx = this.scale.width  - margin - btnSize/2;
    const aby = this.scale.height - margin - btnSize/2;
    const btnA = this.add.circle(abx, aby, btnSize/2, 0xc8a030, 0.3)
      .setScrollFactor(0).setDepth(2000).setInteractive();
    this.add.text(abx, aby, 'A', {
      font: '20px monospace', fill: '#f0e0a0'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(2001);
    this._dpadBtnA = btnA;

    // HUD
    this._hud = this.add.text(8, 8, '', {
      font:'8px monospace', fill:'#f0e0a0',
      backgroundColor:'#00000099', padding:{x:4,y:3}
    }).setScrollFactor(0).setDepth(1000);

    this.add.text(
      this.scale.width/2, this.scale.height-14,
      'FLÈCHES · WASD · ZQSD',
      {font:'8px monospace', fill:'#557744'}
    ).setOrigin(0.5).setScrollFactor(0).setDepth(1000);
  }

  _isDown(k) {
    const c = this._cursors;
    const d = this._dpad;
    if (k==='up')    return c.up.isDown    || this._keyW.isDown || this._keyZ.isDown || d.up;
    if (k==='down')  return c.down.isDown  || this._keyS.isDown || d.down;
    if (k==='left')  return c.left.isDown  || this._keyA.isDown || this._keyQ.isDown || d.left;
    if (k==='right') return c.right.isDown || this._keyD.isDown || d.right;
    return false;
  }

  _isSolid(wx, wy) {
    return isSolidGrid(wx, wy);
  }

  _drawPlayer() {
    const s = this._shadow;
    s.clear();
    s.fillStyle(0x000000, 0.3);
    s.fillEllipse(Math.round(this._px), Math.round(this._py) + 10, 14, 5);

    // Mettre à jour position du sprite
    this._sprite.setPosition(this._px, this._py);
    this._sprite.setDepth(this._py + 1);

    // Animation selon état
    const dir = this._facing;
    if (this._moving) {
      const walkKey = 'walk_' + dir;
      if (this._sprite.anims.currentAnim && this._sprite.anims.currentAnim.key !== walkKey) {
        this._sprite.play(walkKey);
      }
    } else {
      const idleKey = 'idle_' + dir;
      if (this._sprite.anims.currentAnim && this._sprite.anims.currentAnim.key !== idleKey) {
        this._sprite.play(idleKey);
      }
    }
  }

  update(time, delta) {
    const SPEED = 80, dt = Math.min(delta, 50), HIT = 5;
    let dx=0, dy=0;
    if (this._isDown('left'))  { dx=-1; this._facing='left'; }
    if (this._isDown('right')) { dx= 1; this._facing='right'; }
    if (this._isDown('up'))    { dy=-1; this._facing='up'; }
    if (this._isDown('down'))  { dy= 1; this._facing='down'; }
    if (dx&&dy) { dx*=0.707; dy*=0.707; }

    const spd = SPEED*dt/1000;
    const nx = this._px + dx*spd;
    const ny = this._py + dy*spd;
    const mW = this._map.widthInPixels;
    const mH = this._map.heightInPixels;

    if (!this._isSolid(nx-HIT, this._py) && !this._isSolid(nx+HIT, this._py))
      this._px = Phaser.Math.Clamp(nx, HIT, mW-HIT);
    if (!this._isSolid(this._px, ny-HIT) && !this._isSolid(this._px, ny+HIT))
      this._py = Phaser.Math.Clamp(ny, HIT, mH-HIT);

    this._moving = dx!==0 || dy!==0;

    // Caméra suit le joueur
    this.cameras.main.centerOn(this._px, this._py);
    this._drawPlayer();

    const T = 16;
    this._hud.setText(`[${Math.floor(this._px/T)}, ${Math.floor(this._py/T)}]`);
  }
}

new Phaser.Game({
