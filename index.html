<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocabulary Raid v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#1a2a1a; overflow:hidden; }

/* ── Login screen ── */
#loginScreen {
  position:fixed; inset:0; z-index:99999;
  background:rgba(10,20,10,0.92);
  display:flex; align-items:center; justify-content:center;
  font-family: monospace;
}
#loginScreen.hidden { display:none; }
.login-box {
  background:#111e11;
  border:2px solid #4a7a4a;
  border-radius:12px;
  padding:32px 28px;
  width:min(340px, 90vw);
  display:flex; flex-direction:column; gap:16px;
  align-items:center;
}
.login-title { color:#f0e0a0; font-size:20px; font-weight:bold; letter-spacing:1px; }
.login-subtitle { color:#88aa66; font-size:12px; text-align:center; }
.login-input {
  width:100%; padding:10px 14px;
  background:#1a2e1a; border:1px solid #4a7a4a; border-radius:8px;
  color:#f0e0a0; font-size:16px; font-family:monospace;
  outline:none;
}
.login-input:focus { border-color:#a0d060; }
.login-btn {
  width:100%; padding:10px;
  background:#2a5a2a; border:1px solid #4a9a4a; border-radius:8px;
  color:#f0e0a0; font-size:15px; font-family:monospace;
  cursor:pointer; transition:background 0.15s;
}
.login-btn:hover { background:#3a7a3a; }
.login-btn:disabled { opacity:0.5; cursor:not-allowed; }
.login-btn-back {
  background:none; border:none; color:#88aa66;
  font-size:13px; font-family:monospace; cursor:pointer;
  text-decoration:underline;
}
.login-error { color:#e05050; font-size:13px; text-align:center; min-height:18px; }
#stepPin { display:none; flex-direction:column; gap:12px; width:100%; }
.pin-who { color:#a0d060; font-size:14px; text-align:center; }

@keyframes pinShake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.pin-wrong { animation: pinShake 0.4s ease; border-color:#e05050 !important; }
</style>
</head>
<body>

<!-- ── Login screen ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">⚔ Vocabulary Raid v2</div>
    <div class="login-subtitle">Enter your student ID to join the raid</div>

    <div id="stepId" style="display:flex;flex-direction:column;gap:12px;width:100%">
      <input type="text" class="login-input" id="loginInput"
        placeholder="Student ID" autocomplete="off" autocorrect="off"
        autocapitalize="none" spellcheck="false">
      <button class="login-btn" id="loginBtnId">Next →</button>
    </div>

    <div id="stepPin">
      <div class="pin-who">PIN for <span id="pinWhoLabel"></span></div>
      <input type="password" class="login-input" id="pinInput"
        placeholder="4-digit PIN" maxlength="4" inputmode="numeric">
      <button class="login-btn" id="loginBtnPin">Enter ⚔</button>
      <button class="login-btn-back" id="loginBtnBack">← Back</button>
    </div>

    <div class="login-error" id="loginError"></div>
  </div>
</div>

<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue, onDisconnect, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAFD1FEJntgI4diqiCQo0mWGVW4TJ3sL4o",
  authDomain:        "english-boss-fight.firebaseapp.com",
  databaseURL:       "https://english-boss-fight-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "english-boss-fight",
  storageBucket:     "english-boss-fight.firebasestorage.app",
  appId:             "1:154982760978:web:c9d9a5ed4744bdd7670ecb"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// Exposer db et les helpers Firebase pour Phaser
window._fbDb  = db;
window._fbRef = ref;
window._fbSet = set;
window._fbOnValue = onValue;
window._fbOnDisconnect = onDisconnect;

const $ = id => document.getElementById(id);

let pendingSnap  = null;
window.studentData = null;  // accessible globalement

async function handleStep1() {
  const id    = $('loginInput').value.trim().toLowerCase();
  const errEl = $('loginError');
  errEl.textContent = '';
  if (!id) return;

  $('loginBtnId').disabled = true;
  $('loginBtnId').textContent = '…';

  const snap = await get(ref(db, `students/${id}`));

  $('loginBtnId').disabled = false;
  $('loginBtnId').textContent = 'Next →';

  if (!snap.exists()) {
    errEl.textContent = 'Unknown ID. Ask your teacher.';
    return;
  }

  pendingSnap = snap;
  $('pinWhoLabel').textContent = id.toUpperCase();
  $('stepId').style.display  = 'none';
  $('stepPin').style.display = 'flex';
  $('pinInput').value = '';
  $('pinInput').focus();
}

async function handleStep2() {
  const errEl = $('loginError');
  const pin   = $('pinInput').value.trim();
  errEl.textContent = '';

  if (pin.length !== 4) {
    errEl.textContent = 'Enter your 4-digit PIN.';
    return;
  }

  if (pin !== String(pendingSnap.val().pin)) {
    const el = $('pinInput');
    el.classList.remove('pin-wrong');
    void el.offsetWidth;
    el.classList.add('pin-wrong');
    setTimeout(() => el.classList.remove('pin-wrong'), 450);
    el.value = '';
    errEl.textContent = 'Wrong PIN. Try again.';
    return;
  }

  const id = $('loginInput').value.trim().toLowerCase();
  window.studentData = pendingSnap.val();
  window.studentData.id = id;

  // Listener temps réel sur les données du joueur
  onValue(ref(db, `students/${id}`), snap => {
    if (!window.studentData) return;
    const fresh = snap.val();
    window.studentData = { ...fresh, id };
  });

  // Masquer l'écran de login et lancer le jeu
  $('loginScreen').classList.add('hidden');
  if (typeof window.startGame === 'function') window.startGame();
}

$('loginBtnId').addEventListener('click', handleStep1);
$('loginBtnPin').addEventListener('click', handleStep2);
$('loginBtnBack').addEventListener('click', () => {
  $('stepPin').style.display = 'none';
  $('stepId').style.display  = 'flex';
  $('loginError').textContent = '';
  pendingSnap = null;
});
$('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleStep1(); });
$('pinInput').addEventListener('keydown',   e => { if (e.key === 'Enter') handleStep2(); });
</script>

// ══════════════════════════════════════════════════════════════
// TransitionScene — Fondu blanc entre zones
// ══════════════════════════════════════════════════════════════
class TransitionScene extends Phaser.Scene {
  constructor() { super('Transition'); }

  init(data) {
    this._targetZone  = data.targetZone;
    this._spawnX      = data.spawnX;
    this._spawnY      = data.spawnY;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    const rect = this.add.rectangle(W/2, H/2, W, H, 0xffffff, 0)
      .setScrollFactor(0).setDepth(9999);

    // Fondu blanc entrant (transparent → blanc)
    this.tweens.add({
      targets: rect, alpha: 1, duration: 400, ease: 'Linear',
      onComplete: () => {
        // Lancer la nouvelle zone
        this.scene.start(this._targetZone, {
          spawnX: this._spawnX,
          spawnY: this._spawnY,
          fromTransition: true,
        });
        this.scene.stop();
      }
    });
  }
}

// ══════════════════════════════════════════════════════════════
// BaseZoneScene — classe parente pour toutes les zones
// ══════════════════════════════════════════════════════════════
class BaseZoneScene extends Phaser.Scene {
  constructor(key) { super(key); this._zoneKey = key; }

  init(data) {
    this._spawnX = data && data.spawnX != null ? data.spawnX : ZONES[this._zoneKey].spawnX;
    this._spawnY = data && data.spawnY != null ? data.spawnY : ZONES[this._zoneKey].spawnY;
    this._fromTransition = data && data.fromTransition;
  }

  preload() {
    const W = this.scale.width, H = this.scale.height;
    const bg  = this.add.rectangle(W/2, H/2, 320, 36, 0x111122);
    const bar = this.add.rectangle(W/2-158, H/2, 4, 28, 0xc8a030).setOrigin(0, 0.5);
    const lbl = this.add.text(W/2, H/2-30, 'Loading ' + this._zoneKey + '...', {
      font:'14px monospace', fill:'#f0e0a0'
    }).setOrigin(0.5);
    this.load.on('progress', v => { bar.width = 316*v; });
    this.load.on('loaderror', f => console.error('ERREUR:', f.key));

    const zone = ZONES[this._zoneKey];

    // Charger les tilesets de cette zone
    const loaded = new Set();
    for (const tsKey of zone.tilesets) {
      if (loaded.has(tsKey)) continue;
      loaded.add(tsKey);
      const png = TILESET_PNG[tsKey];
      if (!png) { console.warn('PNG manquant pour:', tsKey); continue; }
      if (!this.textures.exists(tsKey)) {
        this.load.image(tsKey, BASE + png);
      }
    }

    // Carte
    if (!this.cache.tilemap.exists('map_' + this._zoneKey)) {
      this.load.tilemapTiledJSON('map_' + this._zoneKey, BASE + zone.mapFile);
    }

    // Sprites joueur (communs)
    if (!this.textures.exists('char_idle')) {
      this.load.spritesheet('char_idle',  BASE + 'Character_Idle.png',  { frameWidth: 40, frameHeight: 48 });
      this.load.spritesheet('char_walk',  BASE + 'Character_Walk.png',  { frameWidth: 40, frameHeight: 48 });
      this.load.spritesheet('char_slash', BASE + 'Character_Slash.png', { frameWidth: 40, frameHeight: 48 });
    }
  }

  create() {
    const zone   = ZONES[this._zoneKey];
    const map    = this.make.tilemap({ key: 'map_' + this._zoneKey });
    this._map    = map;

    // Ajouter les tilesets
    const tilesets = [];
    for (const tsKey of zone.tilesets) {
      try {
        const ts = map.addTilesetImage(tsKey, tsKey, 16, 16, 0, 0);
        if (ts) tilesets.push(ts);
      } catch(e) {}
    }

    // Créer les layers
    const layerOrder = [
      'Ground','Ground fix','Shore','Road','Farm Field','Farm Fields',
      'Flowers','Water','Floor','Grass','Shadow','Grass 2','Shadow 2',
      'Castle Floor 1','Castle Floor 2','RockSlopes_1_Brown',
      'RockSlopes_1_Brown_Auto','RockSlopes','RockSlopes_Auto',
      'Bridge','Pier','Fence','Tall Grass',
      'Castle Walls 2 Behind','Castle Walls 2','Castle Walls 1',
      'Castle Details','Castle Details 2','Shadows/Shadows','Animations',
    ];
    for (let i = 0; i < layerOrder.length; i++) {
      try {
        const l = map.createLayer(layerOrder[i], tilesets, 0, 0);
        if (l) l.setDepth(i);
      } catch(e) {}
    }

    // Joueur
    this._px     = this._spawnX;
    this._py     = this._spawnY;
    this._facing = 'down';
    this._moving = false;
    this._shadow = this.add.graphics().setDepth(500);

    // Créer les animations si besoin
    if (!this.anims.exists('idle_left')) {
      const DIRS = ['left','right','up','down'];
      DIRS.forEach((dir, row) => {
        this.anims.create({ key:'idle_'+dir, frames:this.anims.generateFrameNumbers('char_idle',{start:row*4,end:row*4+3}), frameRate:4, repeat:-1 });
        this.anims.create({ key:'walk_'+dir, frames:this.anims.generateFrameNumbers('char_walk',{start:row*4,end:row*4+3}), frameRate:8, repeat:-1 });
      });
    }

    this._sprite = this.add.sprite(this._px, this._py, 'char_idle')
      .setDepth(501).setScale(0.72).play('idle_down');

    // Caméra
    this.cameras.main.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
    this.cameras.main.setZoom(ZOOM);
    this.cameras.main.centerOn(this._px, this._py);

    // Input clavier
    this._cursors = this.input.keyboard.createCursorKeys();
    this._keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this._keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);
    this._keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this._keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this._keyZ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z);
    this._keyQ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Q);

    // Bouton action
    this._actionPressed = false;
    this.input.keyboard.on('keydown-SPACE', () => { this._actionPressed = true; });
    this.input.keyboard.on('keyup-SPACE',   () => { this._actionPressed = false; });

    // D-pad HTML
    this._dpad = window._dpad || { up:false, down:false, left:false, right:false, action:false };
    if (!window._dpadCreated) {
      this._createDpad();
      window._dpadCreated = true;
    }

    // HUD
    this._hud = this.add.text(8, 8, '', {
      font:'8px monospace', fill:'#f0e0a0',
      backgroundColor:'#00000099', padding:{x:4,y:3}
    }).setScrollFactor(0).setDepth(1000);

    // Zone label
    this.add.text(this.scale.width/2, 16, zone.key, {
      font:'10px monospace', fill:'#c8a030'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(1000);

    // Multijoueur
    this._otherPlayers = {};
    this._publishTimer = 0;
    this._setupMultiplayer();

    // Panneau noticeboard (spawn uniquement)
    if (zone.hasNoticeboard) {
      this._createNoticeboard();
    }

    // Fondu blanc sortant (blanc → transparent) si on arrive d'une transition
    if (this._fromTransition) {
      const W = this.scale.width, H = this.scale.height;
      const rect = this.add.rectangle(W/2, H/2, W, H, 0xffffff, 1)
        .setScrollFactor(0).setDepth(9998);
      this.tweens.add({
        targets: rect, alpha: 0, duration: 400, ease: 'Linear',
        onComplete: () => rect.destroy()
      });
    }
  }

  _createDpad() {
    const dpad = { up:false, down:false, left:false, right:false, action:false };
    window._dpad = dpad;
    this._dpad = dpad;

    const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
    if (!isTouchDevice) return;

    // Supprimer l'ancien D-pad si existe
    const old = document.getElementById('dpad');
    if (old) old.remove();
    const oldA = document.getElementById('btn-action');
    if (oldA) oldA.remove();

    const dpadEl = document.createElement('div');
    dpadEl.id = 'dpad';
    dpadEl.style.cssText = 'position:fixed;left:20px;bottom:20px;width:192px;height:192px;pointer-events:none;z-index:9999;user-select:none;-webkit-user-select:none;';

    const btnDefs = [
      { dir:'up', left:'64px', top:'0px' },
      { dir:'down', left:'64px', top:'128px' },
      { dir:'left', left:'0px', top:'64px' },
      { dir:'right', left:'128px', top:'64px' },
    ];
    const arrows = { up:'▲', down:'▼', left:'◄', right:'►' };

    btnDefs.forEach(({ dir, left, top }) => {
      const btn = document.createElement('div');
      btn.style.cssText = 'position:absolute;width:60px;height:60px;left:'+left+';top:'+top+';background:rgba(0,0,0,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(240,224,160,0.9);pointer-events:auto;touch-action:none;-webkit-tap-highlight-color:transparent;transition:background 0.1s;';
      btn.textContent = arrows[dir];
      btn.addEventListener('touchstart', e => { e.preventDefault(); dpad[dir]=true; btn.style.background='rgba(255,255,255,0.25)'; }, {passive:false});
      const rel = e => { e.preventDefault(); dpad[dir]=false; btn.style.background='rgba(0,0,0,0.35)'; };
      btn.addEventListener('touchend', rel, {passive:false});
      btn.addEventListener('touchcancel', rel, {passive:false});
      dpadEl.appendChild(btn);
    });
    document.body.appendChild(dpadEl);

    // Bouton Action (A)
    const btnA = document.createElement('div');
    btnA.id = 'btn-action';
    btnA.style.cssText = 'position:fixed;right:24px;bottom:24px;width:64px;height:64px;background:rgba(200,160,48,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(240,224,160,0.9);z-index:9999;pointer-events:auto;touch-action:none;-webkit-tap-highlight-color:transparent;';
    btnA.textContent = 'A';
    btnA.addEventListener('touchstart', e => { e.preventDefault(); dpad.action=true; btnA.style.background='rgba(200,160,48,0.6)'; }, {passive:false});
    const relA = e => { e.preventDefault(); dpad.action=false; btnA.style.background='rgba(200,160,48,0.35)'; };
    btnA.addEventListener('touchend', relA, {passive:false});
    btnA.addEventListener('touchcancel', relA, {passive:false});
    document.body.appendChild(btnA);
  }

  _setupMultiplayer() {
    const myId = window.studentData ? window.studentData.id : null;
    if (!myId || !window._fbDb) return;

    const db  = window._fbDb;
    const fbRef = window._fbRef;
    const scene = this;

    this._myId = myId;
    this._myPresenceRef = fbRef(db, 'presence/' + myId);
    window._fbOnDisconnect(this._myPresenceRef).remove();

    // Écouter les autres joueurs
    window._fbOnValue(fbRef(db, 'presence'), snap => {
      const all = snap.val() || {};

      // Supprimer joueurs partis
      for (const id of Object.keys(scene._otherPlayers)) {
        if (!all[id]) {
          scene._otherPlayers[id].sprite.destroy();
          scene._otherPlayers[id].label.destroy();
          scene._otherPlayers[id].shadow.destroy();
          delete scene._otherPlayers[id];
        }
      }

      // Créer/màj joueurs présents dans la MÊME zone
      for (const [id, data] of Object.entries(all)) {
        if (id === myId) continue;
        if (!data || data.zone !== scene._zoneKey) {
          // Supprimer si dans une autre zone
          if (scene._otherPlayers[id]) {
            scene._otherPlayers[id].sprite.destroy();
            scene._otherPlayers[id].label.destroy();
            scene._otherPlayers[id].shadow.destroy();
            delete scene._otherPlayers[id];
          }
          continue;
        }
        if (!scene._otherPlayers[id]) {
          const shadow = scene.add.graphics().setDepth(500);
          const sprite = scene.add.sprite(data.x, data.y, 'char_idle')
            .setScale(0.72).setDepth(data.y+1).play('idle_down');
          const label = scene.add.text(data.x, data.y-28, id.toUpperCase(), {
            font:'8px monospace', fill:'#ffffff', stroke:'#000000', strokeThickness:3
          }).setOrigin(0.5).setDepth(data.y+2);
          scene._otherPlayers[id] = { sprite, label, shadow, lastData: data };
        } else {
          scene._otherPlayers[id].lastData = data;
        }
      }

      // Mettre à jour le panneau si spawn
      if (scene._updateNoticeboard) scene._updateNoticeboard(all);
    });
  }

  _createNoticeboard() {
    // Panneau multijoueur interactif — visible quand on appuie sur A près du centre
    this._noticeboardOpen = false;

    // Indicateur visuel au panneau
    const zone = ZONES[this._zoneKey];
    const nx = zone.noticeboardX, ny = zone.noticeboardY;
    const indicator = this.add.text(nx, ny - 20, '[ A ]', {
      font:'8px monospace', fill:'#f0e0a0', backgroundColor:'#00000088', padding:{x:3,y:2}
    }).setOrigin(0.5).setDepth(600);
    this._noticeboardIndicator = indicator;

    // Panel HTML par-dessus
    const panel = document.createElement('div');
    panel.id = 'noticeboard-panel';
    panel.style.cssText = [
      'position:fixed','top:50%','left:50%',
      'transform:translate(-50%,-50%)',
      'background:rgba(17,30,17,0.95)',
      'border:2px solid #4a7a4a','border-radius:12px',
      'padding:20px 24px','min-width:280px',
      'font-family:monospace','color:#f0e0a0',
      'z-index:9990','display:none',
      'max-height:70vh','overflow-y:auto',
    ].join(';');

    panel.innerHTML = `
      <div style="font-size:14px;font-weight:bold;margin-bottom:12px;color:#c8a030">⚔ Legion Status</div>
      <div id="noticeboard-list" style="font-size:11px;line-height:1.8"></div>
      <div style="margin-top:14px;text-align:center">
        <button onclick="document.getElementById('noticeboard-panel').style.display='none'" 
          style="background:#2a5a2a;border:1px solid #4a9a4a;border-radius:6px;color:#f0e0a0;font-family:monospace;padding:6px 16px;cursor:pointer">
          Close
        </button>
      </div>
    `;
    document.body.appendChild(panel);
    this._noticeboardPanel = panel;

    this._updateNoticeboard = (allPresence) => {
      const list = document.getElementById('noticeboard-list');
      if (!list) return;
      const entries = Object.entries(allPresence || {});
      if (entries.length === 0) {
        list.innerHTML = '<div style="color:#557744">No warriors online</div>';
        return;
      }
      list.innerHTML = entries.map(([id, data]) => {
        const zone  = data.zone || '?';
        const isMe  = id === (window.studentData && window.studentData.id);
        const color = isMe ? '#c8a030' : '#f0e0a0';
        const zoneColor = { Spawn:'#88aa66', Nord:'#e05050', NordOuest:'#9080c0', Ouest:'#60a0d0', Sud:'#c8a030', SudSud:'#d08050' }[zone] || '#888';
        return `<div style="display:flex;justify-content:space-between;gap:16px;padding:2px 0;">
          <span style="color:${color}">⚔ ${id.toUpperCase()}${isMe?' (you)':''}</span>
          <span style="color:${zoneColor}">[${zone}]</span>
        </div>`;
      }).join('');
    };
  }

  _isDown(k) {
    const c = this._cursors;
    const d = window._dpad || {};
    if (k==='up')    return c.up.isDown    || this._keyW.isDown || this._keyZ.isDown || d.up;
    if (k==='down')  return c.down.isDown  || this._keyS.isDown || d.down;
    if (k==='left')  return c.left.isDown  || this._keyA.isDown || this._keyQ.isDown || d.left;
    if (k==='right') return c.right.isDown || this._keyD.isDown || d.right;
    return false;
  }

  _drawPlayer() {
    const s = this._shadow;
    s.clear();
    s.fillStyle(0x000000, 0.3);
    s.fillEllipse(Math.round(this._px), Math.round(this._py)+10, 14, 5);
    this._sprite.setPosition(this._px, this._py);
    this._sprite.setDepth(this._py+1);
    const dir = this._facing;
    const key = (this._moving ? 'walk_' : 'idle_') + dir;
    if (!this._sprite.anims.currentAnim || this._sprite.anims.currentAnim.key !== key) {
      this._sprite.play(key);
    }
  }

  update(time, delta) {
    const SPEED=80, dt=Math.min(delta,50), HIT=5;
    let dx=0, dy=0;
    if (this._isDown('left'))  { dx=-1; this._facing='left'; }
    if (this._isDown('right')) { dx= 1; this._facing='right'; }
    if (this._isDown('up'))    { dy=-1; this._facing='up'; }
    if (this._isDown('down'))  { dy= 1; this._facing='down'; }
    if (dx&&dy) { dx*=0.707; dy*=0.707; }

    const spd = SPEED*dt/1000;
    const mW  = this._map.widthInPixels;
    const mH  = this._map.heightInPixels;
    const nx  = this._px + dx*spd;
    const ny  = this._py + dy*spd;

    this._px = Phaser.Math.Clamp(nx, HIT, mW-HIT);
    this._py = Phaser.Math.Clamp(ny, HIT, mH-HIT);
    this._moving = dx!==0 || dy!==0;

    // ── Transitions de zone ──
    if (!this._transitioning) {
      const zone = ZONES[this._zoneKey];
      for (const tr of zone.transitions) {
        if (tr.condition(this._px, this._py, mW, mH)) {
          this._transitioning = true;
          const targetCfg = ZONES[tr.targetZone];
          // Publier position finale avant de partir
          if (this._myId && window._fbSet) {
            window._fbSet(window._fbRef(window._fbDb, 'presence/'+this._myId), {
              x: Math.round(this._px), y: Math.round(this._py),
              facing: this._facing, moving: 0, zone: tr.targetZone
            });
          }
          this.scene.start('Transition', {
            targetZone: tr.targetZone,
            spawnX: targetCfg.spawnX,
            spawnY: targetCfg.spawnY,
          });
          // Nettoyer le panneau si existe
          const nb = document.getElementById('noticeboard-panel');
          if (nb) nb.remove();
          return;
        }
      }
    }

    // ── Bouton Action — noticeboard ──
    const actionJustPressed = (this._actionPressed || (window._dpad && window._dpad.action)) && !this._prevAction;
    this._prevAction = this._actionPressed || (window._dpad && window._dpad.action);

    if (actionJustPressed && ZONES[this._zoneKey].hasNoticeboard) {
      const zone = ZONES[this._zoneKey];
      const dist = Phaser.Math.Distance.Between(this._px, this._py, zone.noticeboardX, zone.noticeboardY);
      if (dist < 48) {
        const panel = document.getElementById('noticeboard-panel');
        if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }
    }

    // Indicateur noticeboard visibility
    if (this._noticeboardIndicator) {
      const zone = ZONES[this._zoneKey];
      const dist = Phaser.Math.Distance.Between(this._px, this._py, zone.noticeboardX, zone.noticeboardY);
      this._noticeboardIndicator.setVisible(dist < 64);
    }

    this.cameras.main.centerOn(this._px, this._py);
    this._drawPlayer();
    this._hud.setText('['+this._zoneKey+'] ' + Math.floor(this._px/16)+','+Math.floor(this._py/16));

    // ── Publier position Firebase ──
    this._publishTimer = (this._publishTimer||0) + delta;
    if (this._myId && this._publishTimer >= 100) {
      this._publishTimer = 0;
      window._fbSet(
        window._fbRef(window._fbDb, 'presence/'+this._myId),
        { x:Math.round(this._px), y:Math.round(this._py), facing:this._facing, moving:this._moving?1:0, zone:this._zoneKey }
      );
    }

    // ── Autres joueurs ──
    for (const [id, p] of Object.entries(this._otherPlayers)) {
      const d = p.lastData;
      if (!d) continue;
      p.sprite.x = Phaser.Math.Linear(p.sprite.x, d.x, 0.2);
      p.sprite.y = Phaser.Math.Linear(p.sprite.y, d.y, 0.2);
      p.sprite.setDepth(p.sprite.y+1);
      const dir    = d.facing||'down';
      const moving = d.moving===1;
      const target = (moving?'walk_':'idle_')+dir;
      if (!p.sprite.anims.currentAnim||p.sprite.anims.currentAnim.key!==target) p.sprite.play(target);
      p.shadow.clear();
      p.shadow.fillStyle(0x000000,0.3);
      p.shadow.fillEllipse(p.sprite.x, p.sprite.y+10, 14, 5);
      p.shadow.setDepth(p.sprite.y);
      p.label.setPosition(p.sprite.x, p.sprite.y-28);
      p.label.setDepth(p.sprite.y+2);
    }
  }
}

// ── Zones concrètes ──
class SpawnScene    extends BaseZoneScene { constructor() { super('Spawn'); } }
class NordScene     extends BaseZoneScene { constructor() { super('Nord'); } }
class NordOuestScene extends BaseZoneScene { constructor() { super('NordOuest'); } }
class OuestScene    extends BaseZoneScene { constructor() { super('Ouest'); } }
class SudScene      extends BaseZoneScene { constructor() { super('Sud'); } }
class SudSudScene   extends BaseZoneScene { constructor() { super('SudSud'); } }



// ── BootScene ──
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {
    const W=this.scale.width, H=this.scale.height;
    this.add.rectangle(W/2,H/2,320,36,0x111122);
    const bar=this.add.rectangle(W/2-158,H/2,4,28,0xc8a030).setOrigin(0,0.5);
    this.add.text(W/2,H/2-30,'Vocabulary Raid v2',{font:'14px monospace',fill:'#f0e0a0'}).setOrigin(0.5);
    this.load.on('progress', v => { bar.width=316*v; });
    // Précharger les sprites joueur communs
    this.load.spritesheet('char_idle',  BASE+'Character_Idle.png',  {frameWidth:40,frameHeight:48});
    this.load.spritesheet('char_walk',  BASE+'Character_Walk.png',  {frameWidth:40,frameHeight:48});
    this.load.spritesheet('char_slash', BASE+'Character_Slash.png', {frameWidth:40,frameHeight:48});
  }
  create() { this.scene.start('Spawn'); }
}

// ── CONFIG ──
window.startGame = function() {
  new Phaser.Game({
    type: Phaser.AUTO,
    backgroundColor: '#1a2a1a',
    pixelArt: true,
    input: { activePointers: 4 },
    antialias: false,
    parent: document.body,
    scene: [
      BootScene,
      TransitionScene,
      SpawnScene,
      NordScene,
      NordOuestScene,
      OuestScene,
      SudScene,
      SudSudScene,
    ],
    scale: {
      mode: Phaser.Scale.RESIZE,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      width:  window.innerWidth,
      height: window.innerHeight,
    },
  });
};
