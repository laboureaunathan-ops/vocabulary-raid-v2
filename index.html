<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocabulary Raid v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#1a2a1a; overflow:hidden; }

/* ── Login screen ── */
#loginScreen {
  position:fixed; inset:0; z-index:99999;
  background:rgba(10,20,10,0.92);
  display:flex; align-items:center; justify-content:center;
  font-family: monospace;
}
#loginScreen.hidden { display:none; }
.login-box {
  background:#111e11;
  border:2px solid #4a7a4a;
  border-radius:12px;
  padding:32px 28px;
  width:min(340px, 90vw);
  display:flex; flex-direction:column; gap:16px;
  align-items:center;
}
.login-title { color:#f0e0a0; font-size:20px; font-weight:bold; letter-spacing:1px; }
.login-subtitle { color:#88aa66; font-size:12px; text-align:center; }
.login-input {
  width:100%; padding:10px 14px;
  background:#1a2e1a; border:1px solid #4a7a4a; border-radius:8px;
  color:#f0e0a0; font-size:16px; font-family:monospace;
  outline:none;
}
.login-input:focus { border-color:#a0d060; }
.login-btn {
  width:100%; padding:10px;
  background:#2a5a2a; border:1px solid #4a9a4a; border-radius:8px;
  color:#f0e0a0; font-size:15px; font-family:monospace;
  cursor:pointer; transition:background 0.15s;
}
.login-btn:hover { background:#3a7a3a; }
.login-btn:disabled { opacity:0.5; cursor:not-allowed; }
.login-btn-back {
  background:none; border:none; color:#88aa66;
  font-size:13px; font-family:monospace; cursor:pointer;
  text-decoration:underline;
}
.login-error { color:#e05050; font-size:13px; text-align:center; min-height:18px; }
#stepPin { display:none; flex-direction:column; gap:12px; width:100%; }
.pin-who { color:#a0d060; font-size:14px; text-align:center; }

@keyframes pinShake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.pin-wrong { animation: pinShake 0.4s ease; border-color:#e05050 !important; }

/* ── Quiz / Session panel ── */
#quiz-panel {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(17,30,17,0.97);
  border:2px solid #4a7a4a; border-radius:12px;
  padding:24px 28px; min-width:300px; max-width:90vw;
  font-family:monospace; color:#f0e0a0;
  z-index:9991; display:none;
  box-shadow:0 4px 24px rgba(0,0,0,0.8);
}
#quiz-panel h3 { margin:0 0 8px; color:#c8a030; font-size:13px; }
#quiz-question { font-size:13px; margin:12px 0 6px; line-height:1.5; }
#quiz-hint { font-size:10px; color:#88aa66; margin-bottom:10px; min-height:14px; }
#quiz-hearts { font-size:16px; margin-bottom:10px; letter-spacing:2px; }
#quiz-progress { font-size:10px; color:#88aa66; margin-bottom:8px; }
#quiz-input {
  width:100%; padding:8px 10px; font-size:14px;
  background:#1a2e1a; border:1px solid #4a7a4a; border-radius:6px;
  color:#f0e0a0; font-family:monospace; outline:none;
  box-sizing:border-box;
}
#quiz-input.correct { border-color:#4a9a4a; background:#1a3a1a; }
#quiz-input.wrong   { border-color:#e05050; background:#3a1a1a; }
#quiz-feedback { font-size:11px; margin:8px 0; min-height:16px; }
#quiz-feedback.correct { color:#4adb6a; }
#quiz-feedback.wrong   { color:#e05050; }
#quiz-submit {
  width:100%; padding:9px; margin-top:8px;
  background:#2a5a2a; border:1px solid #4a9a4a; border-radius:6px;
  color:#f0e0a0; font-family:monospace; font-size:13px; cursor:pointer;
}
#quiz-submit:disabled { opacity:0.5; cursor:not-allowed; }
#quiz-streak { font-size:10px; color:#f59e0b; margin-top:6px; }

/* ── Lootbox modal ── */
#lootbox-panel {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(17,30,17,0.97);
  border:2px solid #c8a030; border-radius:12px;
  padding:24px 28px; min-width:280px; max-width:90vw;
  font-family:monospace; color:#f0e0a0;
  z-index:9992; display:none;
  box-shadow:0 4px 24px rgba(0,0,0,0.8);
  text-align:center;
}
#lootbox-panel h3 { margin:0 0 16px; color:#c8a030; font-size:14px; }
.loot-item {
  padding:6px 10px; margin:4px 0; border-radius:6px;
  border:1px solid #4a7a4a; font-size:12px;
}
.loot-common    { border-color:#aaa; }
.loot-rare      { border-color:#4a9eff; color:#4a9eff; }
.loot-epic      { border-color:#a855f7; color:#a855f7; }
.loot-legendary { border-color:#f59e0b; color:#f59e0b; }
#lootbox-close {
  margin-top:14px; width:100%; padding:8px;
  background:#2a5a2a; border:1px solid #4a9a4a; border-radius:6px;
  color:#f0e0a0; font-family:monospace; cursor:pointer;
}

/* Slime hint */
#slime-hint {
  position:absolute; pointer-events:none;
  background:rgba(0,0,0,0.75); color:#f0e0a0;
  font-size:8px; font-family:monospace;
  padding:2px 5px; border-radius:4px; display:none;
}

/* ── Noticeboard panel ── */
#noticeboard-panel {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(17,30,17,0.97);
  border:2px solid #4a7a4a; border-radius:12px;
  padding:20px 24px; min-width:260px;
  font-family:monospace; color:#f0e0a0;
  z-index:9990; display:none;
  max-height:70vh; overflow-y:auto;
  box-shadow:0 4px 24px rgba(0,0,0,0.7);
}
#noticeboard-panel h3 {
  margin:0 0 12px 0; font-size:14px;
  color:#c8a030; letter-spacing:1px;
}
.nb-row {
  display:flex; justify-content:space-between;
  gap:16px; padding:3px 0;
  font-size:11px; border-bottom:1px solid #2a4a2a;
}
.nb-close {
  margin-top:14px; width:100%; padding:7px;
  background:#2a5a2a; border:1px solid #4a9a4a;
  border-radius:6px; color:#f0e0a0;
  font-family:monospace; cursor:pointer;
}
#noticeboard-hint {
  position:absolute; background:rgba(0,0,0,0.75);
  color:#f0e0a0; font-size:8px; font-family:monospace;
  padding:2px 5px; border-radius:4px;
  pointer-events:none; display:none;
}
</style>
</head>
<body>

<!-- ── Login screen ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">⚔ Vocabulary Raid v2</div>
    <div class="login-subtitle">Enter your student ID to join the raid</div>

    <div id="stepId" style="display:flex;flex-direction:column;gap:12px;width:100%">
      <input type="text" class="login-input" id="loginInput"
        placeholder="Student ID" autocomplete="off" autocorrect="off"
        autocapitalize="none" spellcheck="false">
      <button class="login-btn" id="loginBtnId">Next →</button>
    </div>

    <div id="stepPin">
      <div class="pin-who">PIN for <span id="pinWhoLabel"></span></div>
      <input type="password" class="login-input" id="pinInput"
        placeholder="4-digit PIN" maxlength="4" inputmode="numeric">
      <button class="login-btn" id="loginBtnPin">Enter ⚔</button>
      <button class="login-btn-back" id="loginBtnBack">← Back</button>
    </div>

    <div class="login-error" id="loginError"></div>
  </div>
</div>

<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update, onValue, onDisconnect, runTransaction, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAFD1FEJntgI4diqiCQo0mWGVW4TJ3sL4o",
  authDomain:        "english-boss-fight.firebaseapp.com",
  databaseURL:       "https://english-boss-fight-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "english-boss-fight",
  storageBucket:     "english-boss-fight.firebasestorage.app",
  appId:             "1:154982760978:web:c9d9a5ed4744bdd7670ecb"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// Exposer db et les helpers Firebase pour Phaser
window._fbDb  = db;
window._fbRef = ref;
window._fbSet = set;
window._fbGet = get;
window._fbUpdate = update;
window._fbRunTransaction = runTransaction;
window._fbOnValue = onValue;
window._fbOnDisconnect = onDisconnect;

const $ = id => document.getElementById(id);

let pendingSnap  = null;
window.studentData = null;  // accessible globalement

async function handleStep1() {
  const id    = $('loginInput').value.trim().toLowerCase();
  const errEl = $('loginError');
  errEl.textContent = '';
  if (!id) return;

  $('loginBtnId').disabled = true;
  $('loginBtnId').textContent = '…';

  const snap = await get(ref(db, `students/${id}`));

  $('loginBtnId').disabled = false;
  $('loginBtnId').textContent = 'Next →';

  if (!snap.exists()) {
    errEl.textContent = 'Unknown ID. Ask your teacher.';
    return;
  }

  pendingSnap = snap;
  $('pinWhoLabel').textContent = id.toUpperCase();
  $('stepId').style.display  = 'none';
  $('stepPin').style.display = 'flex';
  $('pinInput').value = '';
  $('pinInput').focus();
}

async function handleStep2() {
  const errEl = $('loginError');
  const pin   = $('pinInput').value.trim();
  errEl.textContent = '';

  if (pin.length !== 4) {
    errEl.textContent = 'Enter your 4-digit PIN.';
    return;
  }

  if (pin !== String(pendingSnap.val().pin)) {
    const el = $('pinInput');
    el.classList.remove('pin-wrong');
    void el.offsetWidth;
    el.classList.add('pin-wrong');
    setTimeout(() => el.classList.remove('pin-wrong'), 450);
    el.value = '';
    errEl.textContent = 'Wrong PIN. Try again.';
    return;
  }

  const id = $('loginInput').value.trim().toLowerCase();
  window.studentData = pendingSnap.val();
  window.studentData.id = id;

  // Listener temps réel sur les données du joueur
  onValue(ref(db, `students/${id}`), snap => {
    if (!window.studentData) return;
    const fresh = snap.val();
    window.studentData = { ...fresh, id };
  });

  // Masquer l'écran de login et lancer le jeu
  $('loginScreen').classList.add('hidden');
  if (typeof window.startGame === 'function') window.startGame();
}

$('loginBtnId').addEventListener('click', handleStep1);
$('loginBtnPin').addEventListener('click', handleStep2);
$('loginBtnBack').addEventListener('click', () => {
  $('stepPin').style.display = 'none';
  $('stepId').style.display  = 'flex';
  $('loginError').textContent = '';
  pendingSnap = null;
});
$('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleStep1(); });
$('pinInput').addEventListener('keydown',   e => { if (e.key === 'Enter') handleStep2(); });
</script>

function isSolidGrid(wx, wy) {
  const col = Math.floor(wx / 16);
  const row = Math.floor(wy / 16);
  if (row < 0 || row >= 40 || col < 0 || col >= 40) return true;
  return COLLISION_GRID[row][col] === 1;
}

      this._noticeboardX, this._noticeboardY - 24,
      '[ E ]', {
        font:'8px monospace', fill:'#f0e0a0',
        backgroundColor:'#00000088', padding:{x:3,y:2}
      }
    ).setOrigin(0.5).setDepth(1001).setVisible(false);


    // ── D-pad tactile HTML (mobile) ──
    const dpad = { up: false, down: false, left: false, right: false };
    this._dpad = dpad;

    const dpadEl = document.createElement('div');
    dpadEl.id = 'dpad';
    dpadEl.style.cssText = [
      'position:fixed',
      'left:20px',
      'bottom:20px',
      'width:192px',
      'height:192px',
      'pointer-events:none',
      'z-index:9999',
      'user-select:none',
      '-webkit-user-select:none',
    ].join(';');

    const btnDefs = [
      { dir:'up',    left:'64px',  top:'0px'   },
      { dir:'down',  left:'64px',  top:'128px' },
      { dir:'left',  left:'0px',   top:'64px'  },
      { dir:'right', left:'128px', top:'64px'  },
    ];
    const arrows = { up:'▲', down:'▼', left:'◄', right:'►' };

    btnDefs.forEach(({ dir, left, top }) => {
      const btn = document.createElement('div');
      btn.style.cssText = [
        'position:absolute',
        'width:60px',
        'height:60px',
        'left:' + left,
        'top:' + top,
        'background:rgba(0,0,0,0.35)',
        'border-radius:50%',
        'display:flex',
        'align-items:center',
        'justify-content:center',
        'font-size:22px',
        'color:rgba(240,224,160,0.9)',
        'pointer-events:auto',
        'touch-action:none',
        '-webkit-tap-highlight-color:transparent',
        'transition:background 0.1s',
      ].join(';');
      btn.textContent = arrows[dir];

      btn.addEventListener('touchstart', e => {
        e.preventDefault();
        dpad[dir] = true;
        btn.style.background = 'rgba(255,255,255,0.25)';
      }, { passive: false });

      const release = e => {
        e.preventDefault();
        dpad[dir] = false;
        btn.style.background = 'rgba(0,0,0,0.35)';
      };
      btn.addEventListener('touchend',    release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });

      dpadEl.appendChild(btn);
    });

    // Ajouter le D-pad uniquement sur écran tactile (mobile/tablette)
    // pointer:coarse = écran tactile, pointer:fine = souris
    const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
    if (isTouchDevice) {
      document.body.appendChild(dpadEl);

      // Bouton Action A
      const btnA = document.createElement('div');
      btnA.id = 'btn-action';
      btnA.style.cssText = [
        'position:fixed', 'right:24px', 'bottom:24px',
        'width:64px', 'height:64px',
        'background:rgba(200,160,48,0.35)',
        'border-radius:50%',
        'display:flex', 'align-items:center', 'justify-content:center',
        'font-size:22px', 'color:rgba(240,224,160,0.9)',
        'z-index:9999', 'pointer-events:auto',
        'touch-action:none', '-webkit-tap-highlight-color:transparent',
        'font-family:monospace', 'font-weight:bold',
        'transition:background 0.1s',
      ].join(';');
      btnA.textContent = 'A';
      btnA.addEventListener('touchstart', e => {
        e.preventDefault();
        this._actionJustPressed = true;
        btnA.style.background = 'rgba(200,160,48,0.7)';
      }, { passive: false });
      const relA = e => {
        e.preventDefault();
        btnA.style.background = 'rgba(200,160,48,0.35)';
      };
      btnA.addEventListener('touchend',    relA, { passive: false });
      btnA.addEventListener('touchcancel', relA, { passive: false });
      document.body.appendChild(btnA);
    }

    // HUD
    this._hud = this.add.text(8, 8, '', {
      font:'8px monospace', fill:'#f0e0a0',
      backgroundColor:'#00000099', padding:{x:4,y:3}
    }).setScrollFactor(0).setDepth(1000);

    this.add.text(
      this.scale.width/2, this.scale.height-14,
      'FLÈCHES · WASD · ZQSD',
      {font:'8px monospace', fill:'#557744'}
    ).setOrigin(0.5).setScrollFactor(0).setDepth(1000);

    // ── Animations slime ──
    const SDIRS = ['left','right','up','down'];
    SDIRS.forEach((dir, row) => {
      this.anims.create({ key:'slime_walk_'+dir,   frames:this.anims.generateFrameNumbers('slime_walk',  {start:row*4, end:row*4+3}), frameRate:6, repeat:-1 });
      this.anims.create({ key:'slime_idle_'+dir,   frames:this.anims.generateFrameNumbers('slime_idle',  {start:row*2, end:row*2+1}), frameRate:3, repeat:-1 });
      this.anims.create({ key:'slime_attack_'+dir, frames:this.anims.generateFrameNumbers('slime_attack',{start:row*6, end:row*6+5}), frameRate:10, repeat:0 });
    });
    this.anims.create({ key:'slime_death', frames:this.anims.generateFrameNumbers('slime_death',{start:0,end:27}), frameRate:8, repeat:0 });

    // ── Spawn du Slime (à côté du BulletinBoard) ──
    this._slimeX    = 480;
    this._slimeY    = 320;
    this._slimeFacing = 'down';
    this._slimeMoveTimer = 0;
    this._slimeMoveDir   = { dx:0, dy:0 };
    this._slimeMoveTime  = 0;
    this._slimeInSession = false;

    this._slimeShadow = this.add.graphics().setDepth(500);
    this._slimeSprite = this.add.sprite(this._slimeX, this._slimeY, 'slime_walk')
      .setScale(1.2).setDepth(this._slimeY+1)
      .play('slime_walk_down');

    this._slimeHint = this.add.text(
      this._slimeX, this._slimeY - 28, '[ E ]', {
        font:'8px monospace', fill:'#f0e0a0',
        backgroundColor:'#00000088', padding:{x:3,y:2}
      }
    ).setOrigin(0.5).setDepth(1001).setVisible(false);
    this._otherPlayers = {};   // id -> { sprite, label, shadow, lastData }
    this._publishTimer = 0;

    const myId = window.studentData ? window.studentData.id : null;
    console.log('[MP] studentData:', window.studentData);
    console.log('[MP] myId:', myId, '| _fbDb:', !!window._fbDb, '| _fbSet:', !!window._fbSet);
    if (myId && window._fbDb) {
      const db        = window._fbDb;
      const fbRef     = window._fbRef;
      const fbSet     = window._fbSet;
      const fbOnValue = window._fbOnValue;
      const fbOnDisc  = window._fbOnDisconnect;

      this._myPresenceRef = fbRef(db, `presence/${myId}`);

      // Supprimer la présence quand le joueur se déconnecte
      fbOnDisc(this._myPresenceRef).remove();

      // Écouter tous les joueurs en temps réel
      fbOnValue(fbRef(db, 'presence'), snap => {
        const all = snap.val() || {};
        const scene = this;

        // Mettre à jour le panneau noticeboard
        const list = document.getElementById('noticeboard-list');
        if (list) {
          const entries = Object.entries(all);
          if (entries.length === 0) {
            list.innerHTML = '<div style="color:#557744;font-size:11px">No warriors online</div>';
          } else {
            list.innerHTML = entries.map(([id, data]) => {
              const isMe = id === myId;
              const col  = isMe ? '#c8a030' : '#f0e0a0';
              return `<div class="nb-row">
                <span style="color:${col}">⚔ ${id.toUpperCase()}${isMe ? ' <span style="color:#88aa66">(you)</span>' : ''}</span>
                <span style="color:#88aa66">🟢 Online</span>
              </div>`;
            }).join('');
          }
        }

        // Supprimer les joueurs qui ont quitté
        for (const id of Object.keys(scene._otherPlayers)) {
          if (!all[id]) {
            scene._otherPlayers[id].sprite.destroy();
            scene._otherPlayers[id].label.destroy();
            scene._otherPlayers[id].shadow.destroy();
            delete scene._otherPlayers[id];
          }
        }

        // Créer ou mettre à jour les autres joueurs
        for (const [id, data] of Object.entries(all)) {
          if (id === myId) continue;
          if (!data) continue;

          if (!scene._otherPlayers[id]) {
            // Créer le sprite pour ce joueur
            const shadow = scene.add.graphics().setDepth(500);
            const sprite = scene.add.sprite(data.x, data.y, 'char_idle')
              .setScale(0.72)
              .setDepth(data.y + 1)
              .play('idle_down');
            const label = scene.add.text(data.x, data.y - 28, id.toUpperCase(), {
              font: '8px monospace',
              fill: '#ffffff',
              stroke: '#000000',
              strokeThickness: 3,
              backgroundColor: null,
            }).setOrigin(0.5).setDepth(data.y + 2);

            scene._otherPlayers[id] = { sprite, label, shadow, lastData: data };
          } else {
            // Mettre à jour les données
            scene._otherPlayers[id].lastData = data;
          }
        }
      });

      this._myId = myId;
      this._fbSet = fbSet;
    }
  }

  _isDown(k) {
    const c = this._cursors;
    const d = this._dpad;
    if (k==='up')    return c.up.isDown    || this._keyW.isDown || this._keyZ.isDown || d.up;
    if (k==='down')  return c.down.isDown  || this._keyS.isDown || d.down;
    if (k==='left')  return c.left.isDown  || this._keyA.isDown || this._keyQ.isDown || d.left;
    if (k==='right') return c.right.isDown || this._keyD.isDown || d.right;
    return false;
  }

  _isSolid(wx, wy) {
    return isSolidGrid(wx, wy);
  }

  _drawPlayer() {
    const s = this._shadow;
    s.clear();
    s.fillStyle(0x000000, 0.3);
    s.fillEllipse(Math.round(this._px), Math.round(this._py) + 10, 14, 5);

    // Mettre à jour position du sprite
    this._sprite.setPosition(this._px, this._py);
    this._sprite.setDepth(this._py + 1);

    // Animation selon état
    const dir = this._facing;
    if (this._moving) {
      const walkKey = 'walk_' + dir;
      if (this._sprite.anims.currentAnim && this._sprite.anims.currentAnim.key !== walkKey) {
        this._sprite.play(walkKey);
      }
    } else {
      const idleKey = 'idle_' + dir;
      if (this._sprite.anims.currentAnim && this._sprite.anims.currentAnim.key !== idleKey) {
        this._sprite.play(idleKey);
      }
    }
  }

  update(time, delta) {
    const SPEED = 80, dt = Math.min(delta, 50), HIT = 5;
    let dx=0, dy=0;
    if (this._isDown('left'))  { dx=-1; this._facing='left'; }
    if (this._isDown('right')) { dx= 1; this._facing='right'; }
    if (this._isDown('up'))    { dy=-1; this._facing='up'; }
    if (this._isDown('down'))  { dy= 1; this._facing='down'; }
    if (dx&&dy) { dx*=0.707; dy*=0.707; }

    const spd = SPEED*dt/1000;
    const nx = this._px + dx*spd;
    const ny = this._py + dy*spd;
    const mW = this._map.widthInPixels;
    const mH = this._map.heightInPixels;

    if (!this._isSolid(nx-HIT, this._py) && !this._isSolid(nx+HIT, this._py))
      this._px = Phaser.Math.Clamp(nx, HIT, mW-HIT);
    if (!this._isSolid(this._px, ny-HIT) && !this._isSolid(this._px, ny+HIT))
      this._py = Phaser.Math.Clamp(ny, HIT, mH-HIT);

    this._moving = dx!==0 || dy!==0;

    // ── Noticeboard : hint + interaction ──
    const distNB = Phaser.Math.Distance.Between(
      this._px, this._py,
      this._noticeboardX, this._noticeboardY
    );
    const nearBoard = distNB < 40;
    if (this._nbHint) this._nbHint.setVisible(nearBoard);

    if (nearBoard && this._actionJustPressed) {
      const panel = document.getElementById('noticeboard-panel');
      if (panel) {
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }
    }
    this._actionJustPressed = false;

    // Caméra suit le joueur
    this.cameras.main.centerOn(this._px, this._py);
    this._drawPlayer();

    const T = 16;
    this._hud.setText(`[${Math.floor(this._px/T)}, ${Math.floor(this._py/T)}]`);

    // ── Slime AI ──
    if (!this._slimeInSession) {
      this._slimeMoveTime -= delta;
      if (this._slimeMoveTime <= 0) {
        const choices = [
          { dx:1,  dy:0,  dir:'right' },
          { dx:-1, dy:0,  dir:'left'  },
          { dx:0,  dy:1,  dir:'down'  },
          { dx:0,  dy:-1, dir:'up'    },
          { dx:0,  dy:0,  dir:this._slimeFacing },
        ];
        const choice = choices[Math.floor(Math.random()*choices.length)];
        this._slimeMoveDir  = choice;
        this._slimeFacing   = choice.dir;
        this._slimeMoveTime = 800 + Math.random()*1200;
        const moving = choice.dx !== 0 || choice.dy !== 0;
        const ak = (moving ? 'slime_walk_' : 'slime_idle_') + choice.dir;
        if (!this._slimeSprite.anims.currentAnim || this._slimeSprite.anims.currentAnim.key !== ak) {
          this._slimeSprite.play(ak);
        }
      }
      const sd   = this._slimeMoveDir || { dx:0, dy:0 };
      const sspd = 30 * delta/1000;
      const mW   = this._map.widthInPixels;
      const mH   = this._map.heightInPixels;
      this._slimeX = Phaser.Math.Clamp(this._slimeX + sd.dx*sspd, 16, mW-16);
      this._slimeY = Phaser.Math.Clamp(this._slimeY + sd.dy*sspd, 16, mH-16);
      this._slimeShadow.clear();
      this._slimeShadow.fillStyle(0x000000, 0.25);
      this._slimeShadow.fillEllipse(this._slimeX, this._slimeY+10, 20, 7);
      this._slimeShadow.setDepth(this._slimeY);
      this._slimeSprite.setPosition(this._slimeX, this._slimeY);
      this._slimeSprite.setDepth(this._slimeY+1);
      const distSlime = Phaser.Math.Distance.Between(this._px, this._py, this._slimeX, this._slimeY);
      const nearSlime = distSlime < 40;
      this._slimeHint.setPosition(this._slimeX, this._slimeY-32);
      this._slimeHint.setDepth(this._slimeY+2);
      this._slimeHint.setVisible(nearSlime);
      if (nearSlime && this._actionJustPressed) {
        this._startSlimeSession();
      }
    }

    // ── Publier position dans Firebase toutes les 100ms ──
    if (this._myId && this._fbSet) {
      this._publishTimer = (this._publishTimer || 0) + delta;
      if (this._publishTimer >= 100) {
        this._publishTimer = 0;
        const payload = { x: Math.round(this._px), y: Math.round(this._py),
            facing: this._facing, moving: this._moving ? 1 : 0 };
        console.log('[MP] publishing:', payload);
        this._fbSet(
          window._fbRef(window._fbDb, 'presence/' + this._myId),
          payload
        );
      }
    }

    // ── Interpoler et dessiner les autres joueurs ──
    if (this._otherPlayers) {
      for (const [id, p] of Object.entries(this._otherPlayers)) {
        const d = p.lastData;
        if (!d) continue;

        // Interpolation douce vers la position cible
        p.sprite.x = Phaser.Math.Linear(p.sprite.x, d.x, 0.2);
        p.sprite.y = Phaser.Math.Linear(p.sprite.y, d.y, 0.2);
        p.sprite.setDepth(p.sprite.y + 1);

        // Animation selon état reçu
        const dir    = d.facing || 'down';
        const moving = d.moving === 1;
        const target = (moving ? 'walk_' : 'idle_') + dir;
        if (!p.sprite.anims.currentAnim || p.sprite.anims.currentAnim.key !== target) {
          p.sprite.play(target);
        }

        // Ombre
        p.shadow.clear();
        p.shadow.fillStyle(0x000000, 0.3);
        p.shadow.fillEllipse(p.sprite.x, p.sprite.y + 10, 14, 5);
        p.shadow.setDepth(p.sprite.y);

        // Label pseudo
        p.label.setPosition(p.sprite.x, p.sprite.y - 28);
        p.label.setDepth(p.sprite.y + 2);
      }
    }
  }

  async _startSlimeSession() {
    const myId = window.studentData ? window.studentData.id : null;
    if (!myId || this._slimeInSession) return;

    const sid = _getSessionId();
    if (window.studentData.sessionsDone && window.studentData.sessionsDone[sid]) {
      const p = document.getElementById('quiz-panel');
      p.style.display = 'block';
      document.getElementById('quiz-question').textContent = '✓ Session already completed today!';
      document.getElementById('quiz-hint').textContent = 'Come back tomorrow.';
      document.getElementById('quiz-hearts').textContent = '';
      document.getElementById('quiz-progress').textContent = '';
      document.getElementById('quiz-feedback').textContent = '';
      document.getElementById('quiz-streak').textContent = '';
      const btn = document.getElementById('quiz-submit');
      btn.textContent = 'Close';
      btn.disabled = false;
      btn.style.display = 'block';
      btn.onclick = () => { p.style.display='none'; btn.textContent='Submit ⚔'; };
      return;
    }

    this._slimeInSession = true;
    this._slimeSprite.play('slime_idle_down');

    let allQ = [];
    if (window._fbGet && window._fbDb && window._fbRef) {
      const snap = await window._fbGet(window._fbRef(window._fbDb, 'questions'));
      const val  = snap.val();
      allQ = Array.isArray(val) ? val : Object.values(val || {});
    }
    allQ = allQ.sort(() => Math.random()-0.5).slice(0, SESSION_CONFIG.questionsPerSession);

    _session = {
      sid, questions: allQ, currentQ: 0,
      lives: SESSION_CONFIG.lives,
      streak: window.studentData.streak || 0,
      scene: this,
    };
    this._showQuestion();
  }

  _showQuestion() {
    const s = _session;
    const q = s.questions[s.currentQ];
    const p = document.getElementById('quiz-panel');
    p.style.display = 'block';
    document.getElementById('quiz-hearts').textContent =
      '❤'.repeat(s.lives) + '🖤'.repeat(SESSION_CONFIG.lives - s.lives);
    document.getElementById('quiz-progress').textContent =
      'Question ' + (s.currentQ+1) + ' / ' + SESSION_CONFIG.questionsPerSession;
    document.getElementById('quiz-question').textContent = '🇫🇷 ' + q.fr;
    document.getElementById('quiz-hint').textContent = q.hint ? '💡 ' + q.hint : '';
    const inp = document.getElementById('quiz-input');
    inp.value = ''; inp.className = ''; inp.disabled = false;
    document.getElementById('quiz-feedback').textContent = '';
    document.getElementById('quiz-feedback').className = '';
    document.getElementById('quiz-streak').textContent =
      s.streak > 0 ? ('🔥 Streak: ' + s.streak + ' (+' + _getStreakBonus(s.streak) + ' dmg)') : '';
    const btn = document.getElementById('quiz-submit');
    btn.textContent = 'Submit ⚔';
    btn.style.display = 'block';
    btn.disabled = false;
    btn.onclick = () => this._checkAnswer();
    inp.focus();
    inp.onkeydown = (e) => { if (e.key === 'Enter') this._checkAnswer(); };
  }

  async _checkAnswer() {
    const s   = _session;
    const q   = s.questions[s.currentQ];
    const btn = document.getElementById('quiz-submit');
    const inp = document.getElementById('quiz-input');
    if (btn.disabled) return;
    const userAns = _normalize(inp.value);
    if (!userAns) return;
    btn.disabled = true; inp.disabled = true;
    const correct = _normalize(q.en);
    const fb = document.getElementById('quiz-feedback');
    if (userAns === correct) {
      inp.classList.add('correct');
      s.streak++;
      const dmg = SESSION_CONFIG.damagePerCorrect + _getStreakBonus(s.streak);
      fb.textContent = '✓ Correct! -' + dmg + ' HP to the boss!';
      fb.className = 'correct';
      if (window._fbRunTransaction && window._fbDb && window._fbRef) {
        await window._fbRunTransaction(window._fbRef(window._fbDb, 'boss/hp'), cur => Math.max(0, (cur||1800) - dmg));
        await window._fbRunTransaction(window._fbRef(window._fbDb, 'boss/totalDamage'), cur => (cur||0) + dmg);
      }
    } else {
      inp.classList.add('wrong');
      s.streak = 0; s.lives--;
      document.getElementById('quiz-hearts').textContent =
        '❤'.repeat(s.lives) + '🖤'.repeat(SESSION_CONFIG.lives - s.lives);
      fb.textContent = '✗ Answer: ' + q.en;
      fb.className = 'wrong';
    }
    document.getElementById('quiz-streak').textContent =
      s.streak > 0 ? ('🔥 Streak: ' + s.streak + ' (+' + _getStreakBonus(s.streak) + ' dmg)') : '';
    setTimeout(() => {
      s.currentQ++;
      if (s.currentQ >= SESSION_CONFIG.questionsPerSession || s.lives <= 0) {
        this._endSession();
      } else {
        this._showQuestion();
      }
    }, 2000);
  }

  async _endSession() {
    const s   = _session;
    const myId = window.studentData ? window.studentData.id : null;
    if (!myId) return;
    window.studentData.sessionsDone = window.studentData.sessionsDone || {};
    window.studentData.sessionsDone[s.sid] = true;
    window.studentData.sessionCount = (window.studentData.sessionCount || 0) + 1;
    window.studentData.streak = s.streak;
    const loot = _rollLootbox();
    window.studentData.inventory = window.studentData.inventory || {};
    window.studentData.inventory[loot.mat] = (window.studentData.inventory[loot.mat] || 0) + loot.qty;
    if (window._fbUpdate && window._fbRef && window._fbDb) {
      const inv = window.studentData.inventory;
      const updates = {
        sessionCount: window.studentData.sessionCount,
        streak: s.streak,
        ['sessionsDone/' + s.sid]: true,
      };
      Object.keys(inv).forEach(k => { updates['inventory/' + k] = inv[k]; });
      await window._fbUpdate(window._fbRef(window._fbDb, 'students/' + myId), updates);
    }
    document.getElementById('quiz-panel').style.display = 'none';
    const lp = document.getElementById('lootbox-panel');
    document.getElementById('lootbox-content').innerHTML =
      '<div class="loot-item loot-' + loot.rarity + '" style="color:' + RARITY_COLORS[loot.rarity] + '">' +
      loot.label + ' <span style="opacity:0.6;font-size:9px">[' + loot.rarity.toUpperCase() + ']</span></div>' +
      '<div style="margin-top:10px;font-size:10px;color:#88aa66">Session ' + window.studentData.sessionCount + ' complete!<br>Streak 🔥' + s.streak + '</div>';
    lp.style.display = 'block';
    document.getElementById('lootbox-close').onclick = () => {
      lp.style.display = 'none';
      this._slimeInSession = false;
      this._slimeMoveTime  = 0;
      _session = null;
    };
  }

}

// ── CONFIG ──
window.startGame = function() {
  new Phaser.Game({
    type: Phaser.AUTO,
    backgroundColor: '#2a3a1a',
    pixelArt: true,
    input: { activePointers: 4 },
    antialias: false,
    parent: document.body,
    scene: [BootScene, WorldMapScene],
    scale: {
      mode: Phaser.Scale.RESIZE,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      width:  window.innerWidth,
      height: window.innerHeight,
    },
  });
};
